name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Test & Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run tests and generate coverage report
        run: ./gradlew test koverXmlReport koverHtmlReport koverVerify

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: build/reports/kover/

      - name: Extract coverage percentage
        id: extract
        run: |
          COVERAGE=$(python3 - <<'EOF'
          import xml.etree.ElementTree as ET
          tree = ET.parse('build/reports/kover/report.xml')
          root = tree.getroot()
          for counter in root.findall('counter'):
              if counter.get('type') == 'INSTRUCTION':
                  missed = int(counter.get('missed'))
                  covered = int(counter.get('covered'))
                  total = missed + covered
                  pct = round((covered / total) * 100) if total > 0 else 0
                  print(pct)
                  break
          EOF
          )
          echo "COVERAGE=$COVERAGE" >> $GITHUB_ENV

      - name: Compute badge color
        run: |
          if [ "$COVERAGE" -ge 80 ]; then
            COLOR="brightgreen"
          elif [ "$COVERAGE" -ge 60 ]; then
            COLOR="yellow"
          else
            COLOR="red"
          fi
          echo "BADGE_COLOR=$COLOR" >> $GITHUB_ENV

      - name: Update coverage badge in README
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          sed -i "s|!\[Coverage\](https://img.shields.io/badge/coverage-[^)]*)|![Coverage](https://img.shields.io/badge/coverage-${COVERAGE}%25-${BADGE_COLOR})|g" README.md

      - name: Commit and push updated badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "ci: update coverage badge to ${COVERAGE}% [skip ci]"
          git push
